# Node config for live confirmation run (WSL).
# control_url left empty: control registers this node via POST /v1/nodes.
listen_port = 7070
control_url = ""

# Resolve or provision an accelerator-matched llama-server for this WSL node.
llama_server_path = "llama-server"
llama_auto_provision = true

# Allow several concurrent llama-server engines.
max_slots = 6
runtime_port_range_start = 8100
runtime_port_range_end   = 8120

models_dir = "models"
data_dir   = "data"
kv_cache_dir = "data/kv_cache"
log_file = "logs/node.log"
