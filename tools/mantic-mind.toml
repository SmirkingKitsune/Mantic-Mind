# mantic-mind node configuration
# Copy this file next to the mantic-mind executable.
# Environment variables override values set here.

# -- Network ------------------------------------------------------------------
# Port this node listens on for control and inference requests.
listen_port = 7070

# URL of the mantic-mind-control process. Leave empty for standalone mode.
control_url = ""

# Bearer token used to authenticate with control.
control_api_key = ""

# The public node URL is configured with MM_SELF_URL and defaults to
# http://127.0.0.1:<listen_port>.

# -- llama.cpp engine slots ----------------------------------------------------
# Each llama-server process binds one port in this range. It must not overlap
# listen_port.
runtime_port_range_start = 8080
runtime_port_range_end   = 8090

# Maximum number of concurrent llama-server processes.
max_slots = 4

# GPUs advertised by this node. Zero auto-detects with nvidia-smi.
# node_gpu_count = 0

# -- llama.cpp runtime ---------------------------------------------------------
# Agents serve local GGUF models through llama-server. An explicit executable
# path overrides managed runtime selection.
# llama_server_path = "llama-server"        # or MM_LLAMA_PATH

# A bare PATH llama-server is accepted for CPU, for normal Metal-enabled macOS,
# or when auto-provisioning is disabled. Otherwise the node first retrieves an
# accelerator-matched official release and builds from source only when no
# compatible release exists.
# llama_auto_provision = true
# llama_provision_dir = "data/runtimes/llama.cpp"
# llama_install_method = "auto"             # auto | release | source
# llama_version = "latest"                  # release tag or source ref
# llama_accelerator = ""
#   cuda | rocm | vulkan | openvino | sycl-fp32 | sycl-fp16 | metal | cpu
# llama_cuda_arch = ""                      # e.g. 121 for DGX Spark GB10
# llama_build_jobs = 0                       # 0 selects a conservative default

# Managed runtime update behavior.
#   prompt -- report a newer build and wait for approval
#   auto   -- apply newer builds automatically
#   manual -- never check or update automatically
# llama_update_policy = "prompt"
# llama_update_check = true
# llama_update_check_interval_hours = 24

# -- Storage ------------------------------------------------------------------
# Local model cache root. Control transfers GGUF and projector files here when
# a node does not already have them.
models_dir = "models"

# llama.cpp KV-cache checkpoints used when suspending slots.
kv_cache_dir = "data/kv_cache"

# Evict least-recently-used unpinned models once free space on the models_dir
# filesystem drops below this many MiB. Zero disables the proactive threshold.
model_cache_min_free_mb = 10240

# On shutdown, delete every model except those pinned to this node.
model_cache_clear_on_shutdown = true

# Node runtime data root. Remembered pairing API keys live in api_keys.json.
data_dir = "data"

# -- Logging ------------------------------------------------------------------
log_file = "logs/mantic-mind.log"

# -- Discovery and pairing ----------------------------------------------------
# UDP port used for node discovery broadcasts.
# discovery_port = 7072

# Pre-shared key for automatic pairing. Use the same value on node and control
# to skip the PIN dialog.
# pairing_key = ""
