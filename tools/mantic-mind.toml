# mantic-mind node configuration
# Copy this file next to the mantic-mind executable.
# Environment variables override any value set here.

# ── Network ────────────────────────────────────────────────────────────────────
# Port this node listens on for control + infer requests.
listen_port = 7070

# URL of the mantic-mind-control process.
# Leave empty to run the node standalone (no registration).
control_url = ""

# Bearer token to authenticate with the control server.
control_api_key = ""

# URL this node is reachable at from the control server.
# Defaults to http://127.0.0.1:<listen_port> if not set.
# self_url = "http://192.168.1.10:7070"

# ── vLLM engine processes ──────────────────────────────────────────────────────
# Port range for concurrent vLLM engine processes. Each engine slot binds one
# port in this range; the range must not conflict with listen_port.
runtime_port_range_start = 8080
runtime_port_range_end   = 8090

# Maximum number of concurrent model slots (vLLM engine processes).
max_slots = 4

# ── vLLM runtime ───────────────────────────────────────────────────────────────
# vLLM is the local inference runtime on this branch. The node uses an existing
# vLLM on PATH (or a previously provisioned runtime) when available.
# vllm_server_path = "vllm"

# If vllm_server_path cannot be resolved, the node can create a managed vLLM
# runtime under vllm_provision_dir and use that executable for engine slots.
# Windows uses SystemPanic/vllm-windows, Linux uses vllm-project/vllm, and
# Apple Silicon macOS uses vllm-project/vllm-metal.
# vllm_auto_provision = true
# vllm_provision_dir = "data/runtimes/vllm"
# vllm_install_method = "auto"  # auto | wheel | source
# vllm_version = "latest"
# vllm_python_path = ""

# Runtime update management. Auto-provisioning bootstraps a missing runtime;
# these keys govern *updating* an existing install.
# The node picks the accelerator-correct build for its hardware automatically
# (CUDA / ROCm / CPU on Linux, Metal on Apple Silicon, the SystemPanic build on
# Windows).
#   prompt (default) — detect newer builds and prompt; update only when you
#                      approve it (node TUI Update button/popup, or the update
#                      REST endpoint). A live progress bar shows the install.
#   auto             — download and apply updates as soon as they are found
#   manual           — never check for or apply updates automatically
# When one node updates, control nudges same-environment peers to check too, so
# the cluster converges on a consistent version (each peer honors its own policy).
# vllm_update_policy = "prompt"
# vllm_update_check = true                  # run the periodic online version check
# vllm_update_check_interval_hours = 24

# Total fraction of GPU memory all vLLM slots on this node may claim together.
# Each vLLM slot reserves an explicit --gpu-memory-utilization slice out of
# this budget; loads are clamped to the remaining budget and rejected when it
# is exhausted. Range (0, 1].
# vllm_gpu_budget = 0.90

# ── Hugging Face model cache ────────────────────────────────────────────────────
# vLLM resolves a model_path as an HF repo id (auto-downloaded to the HF cache),
# a cache hit, or a local directory. The node reports which repos it has cached
# so control can prefer a node that already holds the model.
#
# hf_cache_dir pins the HF hub cache directory. Point every node at one shared
# location (e.g. an NFS export on the NAS) so a model downloads once for the
# whole cluster. Leave unset to use HF_HUB_CACHE / HF_HOME / ~/.cache/huggingface.
# hf_cache_dir = "/mnt/nas/hf-cache/hub"

# CLI used to pre-fetch models out-of-band (POST /api/node/models/pull), so a
# large download doesn't run inside the load-model health-timeout. Linux only.
# hf_cli_path = "hf"

# ── Cluster capabilities (multi-node engine groups) ─────────────────────────────
# These are auto-detected at startup; set them only to override what this node
# advertises to control for multi-node vLLM engine-group planning.
#
# Collective-comms backends, highest preference first. Auto: Linux+CUDA →
# "nccl,gloo"; native Windows (no NCCL yet) and CPU-only → "gloo".
# comm_backends = "nccl,gloo"
#
# Whether this node can join a multi-node Ray engine group. Auto: true on
# Linux/WSL, false on native Windows.
# supports_ray = true
#
# GPUs visible to this node (0 = auto via nvidia-smi).
# node_gpu_count = 0
#
# Node-to-node link bandwidth hint in Gbps (e.g. 200 for ConnectX 200GbE).
# Used only as a tiebreak when ranking candidate engine groups.
# interconnect_gbps = 0
#
# Ray CLI and head-node GCS port. Live multi-node groups are Linux/WSL only.
# ray_path = "ray"
# ray_port = 6379

# ── Storage ────────────────────────────────────────────────────────────────────
# Local model cache root. When a node lacks a model given as a local path,
# control transfers it here; the node then loads from its own copy. The node
# keeps an LRU use-queue over this directory and evicts unpinned models under
# disk pressure. Pinned models (control marked this node preferred for the
# agent) are never auto-evicted.
models_dir = "models"

# Evict least-recently-used unpinned models once free space on the models_dir
# filesystem drops below this many MB. 0 disables the proactive threshold (a
# transfer still evicts just enough to fit the incoming model).
model_cache_min_free_mb = 10240

# On shutdown, delete every model except those pinned to this node. Set false to
# retain the full local cache across restarts.
model_cache_clear_on_shutdown = true

# Node runtime data root. Remembered pairing API keys live in {data_dir}/api_keys.json.
data_dir = "data"

# ── Logging ────────────────────────────────────────────────────────────────────
log_file = "logs/mantic-mind.log"

# ── Authentication ────────────────────────────────────────────────────────────
# Pre-set API key for this node.  If empty, one is generated on each startup
# and printed to the UI.
# api_key = "change-me"

# ── Discovery & Pairing ────────────────────────────────────────────────────────
# UDP port used for node discovery broadcasts.
# discovery_port = 7072

# Pre-shared key for automatic PSK pairing.
# Set the same value on both node and control to skip the PIN dialog.
# pairing_key = ""
